# cargo-audit configuration
# https://rustsec.org/

[advisories]
# Advisories to ignore (with justification)
ignore = [
    # RUSTSEC-2023-0071: rsa timing sidechannel (Marvin Attack)
    # Severity: Medium (5.9)
    # Status: No fix available as of 2025-12
    # Impact: Used for ActivityPub HTTP signatures (not for encryption of secrets)
    # Risk accepted: Timing attack requires network-level attacker with many requests
    # Tracking: https://github.com/RustCrypto/RSA/issues/19
    "RUSTSEC-2023-0071",
]
