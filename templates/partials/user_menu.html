{% if let Some(user) = current_user %}
<div class="relative group">
    <button
        type="button"
        class="flex items-center space-x-2 text-gray-700 dark:text-gray-300 hover:text-primary-600 dark:hover:text-primary-400 focus:outline-none focus:ring-2 focus:ring-primary-500 rounded-md p-1"
        aria-expanded="false"
        aria-haspopup="true"
    >
        <span class="sr-only">Open user menu</span>
        <span class="text-sm font-medium">{{ user.display_name }}</span>
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
    </button>
    <div
        class="absolute right-0 mt-2 w-48 rounded-md shadow-lg bg-white dark:bg-gray-800 ring-1 ring-black ring-opacity-5 py-1 z-50 invisible opacity-0 group-hover:visible group-hover:opacity-100 group-focus-within:visible group-focus-within:opacity-100 transition-all duration-150"
        role="menu"
        aria-orientation="vertical"
    >
        <a href="/users/{{ user.id }}" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700" role="menuitem">
            My Profile
        </a>
        <a href="/settings" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700" role="menuitem">
            Settings
        </a>
        <hr class="my-1 border-gray-200 dark:border-gray-700">
        <form action="/api/v1/auth/logout" method="post" class="block">
            <button type="submit" class="w-full text-left px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700" role="menuitem">
                Sign Out
            </button>
        </form>
    </div>
</div>
{% else %}
<a href="/login" class="text-gray-700 dark:text-gray-300 hover:text-primary-600 dark:hover:text-primary-400">
    Sign In
</a>
{% endif %}
