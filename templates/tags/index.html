{% extends "layouts/base.html" %}

{% block title %}Tags - Oppskrift{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-8">
        Browse by Tag
    </h1>

    {% if tags.is_empty() %}
    <div class="text-center py-12">
        <p class="text-gray-500 dark:text-gray-400">No tags yet.</p>
    </div>
    {% else %}
    <div class="flex flex-wrap gap-3">
        {% for tag in tags %}
        <a
            href="/tags/{{ tag.slug }}"
            class="inline-flex items-center gap-2 px-4 py-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full text-gray-700 dark:text-gray-300 hover:border-primary-400 hover:text-primary-600 dark:hover:text-primary-400"
        >
            <span class="font-medium">{{ tag.name }}</span>
            <span class="text-xs text-gray-500 dark:text-gray-400">{{ tag.recipe_count }}</span>
        </a>
        {% endfor %}
    </div>
    {% endif %}
</div>
{% endblock %}
