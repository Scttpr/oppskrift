{# Settings navigation partial - included in all settings pages #}
<nav aria-label="Settings navigation" class="mb-8">
    <ul class="flex flex-wrap gap-2 border-b border-gray-200 dark:border-gray-700" role="tablist">
        <li role="presentation">
            <a href="/settings/profile"
               role="tab"
               aria-selected="{% if active_tab == "profile" %}true{% else %}false{% endif %}"
               class="inline-block px-4 py-2 text-sm font-medium rounded-t-lg {% if active_tab == "profile" %}text-primary-600 bg-gray-100 dark:bg-gray-800 dark:text-primary-400 border-b-2 border-primary-600{% else %}text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300{% endif %}"
            >
                Profile
            </a>
        </li>
        <li role="presentation">
            <a href="/settings/security"
               role="tab"
               aria-selected="{% if active_tab == "security" %}true{% else %}false{% endif %}"
               class="inline-block px-4 py-2 text-sm font-medium rounded-t-lg {% if active_tab == "security" %}text-primary-600 bg-gray-100 dark:bg-gray-800 dark:text-primary-400 border-b-2 border-primary-600{% else %}text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300{% endif %}"
            >
                Security
            </a>
        </li>
        <li role="presentation">
            <a href="/settings/account"
               role="tab"
               aria-selected="{% if active_tab == "account" %}true{% else %}false{% endif %}"
               class="inline-block px-4 py-2 text-sm font-medium rounded-t-lg {% if active_tab == "account" %}text-primary-600 bg-gray-100 dark:bg-gray-800 dark:text-primary-400 border-b-2 border-primary-600{% else %}text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300{% endif %}"
            >
                Account
            </a>
        </li>
    </ul>
</nav>
