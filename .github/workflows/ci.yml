name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Test-only encryption key for 2FA (64 hex chars = 32 bytes)
  TOTP_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

jobs:
  # Fast checks - no dependencies, run in parallel
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all -- --check

  # Build and lint - needs database for SQLx query verification
  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://oppskrift:oppskrift@localhost:5432/oppskrift
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: oppskrift
          POSTGRES_PASSWORD: oppskrift
          POSTGRES_DB: oppskrift
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Cache sqlx-cli
        id: cache-sqlx
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/bin/sqlx
          key: sqlx-cli-0.8
      - name: Install sqlx-cli
        if: steps.cache-sqlx.outputs.cache-hit != 'true'
        run: cargo install sqlx-cli --no-default-features --features postgres --locked
      - name: Run migrations
        run: sqlx migrate run
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      # Save artifacts for test job
      - uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            target/
            ~/.cargo/registry/
            ~/.cargo/git/
          key: build-${{ github.sha }}

  # Tests need real database
  test:
    name: Test
    needs: check
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://oppskrift:oppskrift@localhost:5432/oppskrift
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: oppskrift
          POSTGRES_PASSWORD: oppskrift
          POSTGRES_DB: oppskrift
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            target/
            ~/.cargo/registry/
            ~/.cargo/git/
          key: build-${{ github.sha }}
      - name: Cache sqlx-cli
        id: cache-sqlx
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/bin/sqlx
          key: sqlx-cli-0.8
      - name: Install sqlx-cli
        if: steps.cache-sqlx.outputs.cache-hit != 'true'
        run: cargo install sqlx-cli --no-default-features --features postgres --locked
      - name: Run migrations
        run: sqlx migrate run
      - name: Run tests
        run: cargo test
