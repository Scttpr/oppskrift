# Rate Limit API Response Contracts
# OpenAPI 3.0 partial specification

openapi: 3.0.3
info:
  title: Oppskrift Rate Limiting
  version: 1.0.0
  description: Rate limit response contracts for all API endpoints

components:
  responses:
    RateLimitExceeded:
      description: Too many requests - rate limit exceeded
      headers:
        Retry-After:
          description: Seconds until the rate limit resets
          schema:
            type: integer
            example: 60
        X-RateLimit-Limit:
          description: Maximum requests allowed in window
          schema:
            type: integer
            example: 100
        X-RateLimit-Remaining:
          description: Requests remaining in current window
          schema:
            type: integer
            example: 0
        X-RateLimit-Reset:
          description: Unix timestamp when window resets
          schema:
            type: integer
            example: 1704931200
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RateLimitError'
          examples:
            api_limit:
              summary: General API rate limit exceeded
              value:
                error: rate_limit_exceeded
                message: "Too many requests. Please wait 60 seconds before trying again."
                retry_after: 60
            auth_limit:
              summary: Authentication rate limit exceeded
              value:
                error: rate_limit_exceeded
                message: "Too many failed login attempts. Please wait 15 minutes before trying again."
                retry_after: 900
            export_limit:
              summary: Export rate limit exceeded
              value:
                error: rate_limit_exceeded
                message: "You can only export data once per hour. Please wait 45 minutes before trying again."
                retry_after: 2700

  schemas:
    RateLimitError:
      type: object
      required:
        - error
        - message
        - retry_after
      properties:
        error:
          type: string
          enum:
            - rate_limit_exceeded
          description: Error code
        message:
          type: string
          description: Human-readable error message with wait time
        retry_after:
          type: integer
          description: Seconds until request can be retried
          minimum: 1

  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: oppskrift_session

paths:
  # Example of rate-limited endpoint
  /api/v1/auth/login:
    post:
      summary: User login (rate limited)
      description: |
        Rate limits:
        - 5 failed attempts per 15 minutes per IP
        - 10 failed attempts per hour per account
      responses:
        '200':
          description: Login successful
        '401':
          description: Invalid credentials
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /api/v1/users/me/export:
    get:
      summary: Export user data (rate limited)
      description: |
        Rate limits:
        - 1 export per hour per user
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Export data
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /api/v1/recipes:
    get:
      summary: List recipes (rate limited)
      description: |
        Rate limits:
        - 100 requests per minute (authenticated)
        - 30 requests per minute per IP (unauthenticated)
      responses:
        '200':
          description: Recipe list
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
