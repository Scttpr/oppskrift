openapi: 3.1.0
info:
  title: Oppskrift Permissions API
  version: 1.0.0
  description: API for managing resource permissions in the ABAC system

paths:
  /api/v1/recipes/{recipe_id}/permissions:
    get:
      summary: List permissions for a recipe
      description: Returns all permissions granted on a recipe. Only accessible by recipe owner.
      operationId: listRecipePermissions
      tags: [Permissions]
      security:
        - sessionAuth: []
        - bearerAuth: []
      parameters:
        - name: recipe_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      summary: Grant permission on a recipe
      description: Share a recipe with a user, group, or instance.
      operationId: grantRecipePermission
      tags: [Permissions]
      security:
        - sessionAuth: []
        - bearerAuth: []
      parameters:
        - name: recipe_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GrantPermissionRequest'
      responses:
        '201':
          description: Permission granted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Permission'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Permission already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/recipes/{recipe_id}/permissions/{permission_id}:
    delete:
      summary: Revoke permission on a recipe
      description: Remove a previously granted permission.
      operationId: revokeRecipePermission
      tags: [Permissions]
      security:
        - sessionAuth: []
        - bearerAuth: []
      parameters:
        - name: recipe_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: permission_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Permission revoked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/books/{book_id}/permissions:
    get:
      summary: List permissions for a book
      description: Returns all permissions granted on a book. Only accessible by book owner.
      operationId: listBookPermissions
      tags: [Permissions]
      security:
        - sessionAuth: []
        - bearerAuth: []
      parameters:
        - name: book_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      summary: Grant permission on a book
      description: Share a book with a user, group, or instance. Supports contributor level.
      operationId: grantBookPermission
      tags: [Permissions]
      security:
        - sessionAuth: []
        - bearerAuth: []
      parameters:
        - name: book_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GrantPermissionRequest'
      responses:
        '201':
          description: Permission granted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Permission'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/books/{book_id}/permissions/{permission_id}:
    delete:
      summary: Revoke permission on a book
      operationId: revokeBookPermission
      tags: [Permissions]
      security:
        - sessionAuth: []
        - bearerAuth: []
      parameters:
        - name: book_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: permission_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Permission revoked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/books/{book_id}/contributions:
    post:
      summary: Add recipe to book as contributor
      description: Contributors can add their own recipes to a book.
      operationId: addContribution
      tags: [Contributions]
      security:
        - sessionAuth: []
        - bearerAuth: []
      parameters:
        - name: book_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddContributionRequest'
      responses:
        '201':
          description: Recipe added to book
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookContribution'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Not a contributor or doesn't own recipe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/books/{book_id}/contributions/{recipe_id}:
    delete:
      summary: Remove contributed recipe from book
      description: Contributors can remove their own recipes. Book owners can remove any recipe.
      operationId: removeContribution
      tags: [Contributions]
      security:
        - sessionAuth: []
        - bearerAuth: []
      parameters:
        - name: book_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: recipe_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Recipe removed from book
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Not authorized to remove this recipe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: oppskrift_session
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    PermissionLevel:
      type: string
      enum: [view, edit, contributor]
      description: |
        Permission levels:
        - view: Read-only access
        - edit: Read and modify
        - contributor: Add own recipes to book (books only)

    SubjectType:
      type: string
      enum: [user, group, instance]

    GrantPermissionRequest:
      type: object
      required:
        - subject_type
        - permission_level
      properties:
        subject_type:
          $ref: '#/components/schemas/SubjectType'
        subject_id:
          type: string
          format: uuid
          description: Required for user and group types
        subject_domain:
          type: string
          description: Required for instance type (e.g., "mastodon.social")
        permission_level:
          $ref: '#/components/schemas/PermissionLevel'

    Permission:
      type: object
      properties:
        id:
          type: string
          format: uuid
        resource_type:
          type: string
          enum: [recipe, book]
        resource_id:
          type: string
          format: uuid
        subject_type:
          $ref: '#/components/schemas/SubjectType'
        subject_id:
          type: string
          format: uuid
          nullable: true
        subject_domain:
          type: string
          nullable: true
        subject_display_name:
          type: string
          description: Display name of user/group/instance for UI
        permission_level:
          $ref: '#/components/schemas/PermissionLevel'
        granted_by:
          type: string
          format: uuid
        granted_at:
          type: string
          format: date-time

    PermissionListResponse:
      type: object
      properties:
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        resource_type:
          type: string
        resource_id:
          type: string
          format: uuid

    AddContributionRequest:
      type: object
      required:
        - recipe_id
      properties:
        recipe_id:
          type: string
          format: uuid
          description: ID of recipe to add (must be owned by requester)

    BookContribution:
      type: object
      properties:
        id:
          type: string
          format: uuid
        book_id:
          type: string
          format: uuid
        recipe_id:
          type: string
          format: uuid
        contributor_id:
          type: string
          format: uuid
        contributor_display_name:
          type: string
        added_at:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: string

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
