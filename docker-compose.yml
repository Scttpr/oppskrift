services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://oppskrift:oppskrift@db:5432/oppskrift
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: oppskrift
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_REGION: us-east-1
      RUST_LOG: info,oppskrift=debug
      HOST: 0.0.0.0
      PORT: 3000
      INSTANCE_DOMAIN: localhost:3000
      INSTANCE_NAME: Oppskrift Dev
      JWT_SECRET: dev-secret-change-in-production
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: oppskrift
      POSTGRES_PASSWORD: oppskrift
      POSTGRES_DB: oppskrift
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oppskrift"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  # Create bucket on startup
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/oppskrift --ignore-existing;
      mc anonymous set public myminio/oppskrift;
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
